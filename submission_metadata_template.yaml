ai_usage_summary: |
  Used ChatGPT for debugging, architecture guidance, scoring strategy,
  explainability generation, and Streamlit dashboard development.
  No candidate data was sent to external APIs during ranking.

methodology_summary: |
  Built a hybrid candidate ranking system for AI/ML hiring using multiple scoring
  signals. Candidates are evaluated using AI skill matching, professional experience, title
  relevance, career history analysis, recruiter engagement metrics, interview completion
  rates, profile quality, open-to-work status, notice period, and product-company
  experience. To improve ranking quality and reduce keyword-stuffing bias, career
  descriptions and behavioral signals are incorporated alongside skills. The system 
  generates explainable rankings with candidate-specific reasoning and produces the 
  top 100 ranked candidates in the required competition format. A Streamlit dashboard 
  was developed for candidate exploration, explainability, and analytics visualization.

