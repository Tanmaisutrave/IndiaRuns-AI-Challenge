ai_usage_summary: |
  ChatGPT was used for architecture discussions, debugging, feature engineering,
  explainable AI generation, Streamlit dashboard development, documentation,
  and code refinement. No external AI APIs or network calls were used during
  candidate ranking or inference.

methodology_summary: |
  Developed a Hybrid AI Candidate Ranking Engine that evaluates candidates using
  multiple ranking signals including AI/ML skill matching, professional experience,
  career history relevance, behavioral intelligence, education, GitHub activity,
  recruiter engagement, interview completion rate, profile quality, notice period,
  product-company experience, and skill assessment scores. Career descriptions are
  analyzed for retrieval, ranking, recommendation systems, vector databases, and
  large language model experience to improve relevance beyond simple keyword
  matching. The system generates normalized candidate scores, explainable ranking
  justifications, and selects the Top 100 candidates. A Streamlit dashboard was
  built for candidate exploration, explainable AI insights, analytics, and
  submission visualization.

